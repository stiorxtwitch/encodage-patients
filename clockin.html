<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Centre Hospitalier de Liège - Prise de service</title>
<style>
:root{--primary:#e11d48;--primary-dark:#991b1b;--border:#fecaca;--shadow:0 6px 18px rgba(225,29,72,0.08);--danger:#dc2626;--success:#16a34a}
body{font-family:Inter,system-ui;margin:0;background:url('https://i.imgur.com/A6V1lhN.jpg') no-repeat center center fixed;background-size:cover;color:#1f1f1f;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:rgba(255,255,255,0.68);backdrop-filter:blur(4px);z-index:-1}
header{background:linear-gradient(90deg,var(--primary),var(--primary-dark));color:white;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10}
header img{height:58px;border-radius:14px;box-shadow:0 3px 10px rgba(0,0,0,0.2)}
h1{margin:0;font-size:20px;font-weight:700}
.back-btn{background:#dc2626;color:white;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:none;transition:0.2s}
.back-btn:hover{background:#b91c1c}
.container{max-width:800px;margin:80px auto;padding:20px}
.card{background:rgba(255,255,255,0.94);padding:40px;border-radius:16px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border);backdrop-filter:blur(12px)}
button.primary{background:var(--primary);color:white;padding:16px 36px;border:none;border-radius:12px;font-size:19px;cursor:pointer;margin:15px;font-weight:600;transition:0.2s}
button.primary:hover{background:var(--primary-dark)}
#timer{font-size:56px;font-weight:bold;margin:30px 0;color:var(--primary-dark);font-family:monospace}
#recapForm{margin-top:40px;padding:20px;background:#f9f9f9;border-radius:12px;display:none}
.item{display:flex;justify-content:space-between;align-items:center;background:white;padding:12px;border-radius:8px;margin:8px 0;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
.item button{color:var(--danger);background:none;border:none;cursor:pointer;font-size:20px}
.muted{color:#6b7280;font-style:italic}

/* MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center}
#modal-box{background:white;border-radius:16px;padding:32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.3);border-top:4px solid var(--primary);animation:modalIn .2s ease}
@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
#modal-title{margin:0 0 12px;font-size:17px;font-weight:700;color:var(--primary-dark)}
#modal-msg{margin:0 0 20px;font-size:14px;line-height:1.6;color:#374151;white-space:pre-line}
#modal-input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);box-sizing:border-box;font-size:14px;margin-bottom:16px}
#modal-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(225,29,72,.15)}
#modal-actions{display:flex;gap:12px;justify-content:flex-end}
#modal-cancel{background:transparent;border:1.5px solid #e5e7eb;padding:10px 20px;border-radius:10px;cursor:pointer;font-size:14px;transition:.2s;font-weight:500}
#modal-cancel:hover{border-color:var(--primary);background:#fff5f5}
#modal-ok{background:var(--primary);color:white;padding:10px 24px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;transition:.2s}
#modal-ok:hover{background:var(--primary-dark)}
</style>
</head>
<body>
<header>
  <img src="https://i.imgur.com/Qp0gzZL.png" alt="CHL">
  <h1>Prise de service</h1>
  <a href="index.html" class="back-btn">Retour</a>
</header>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <p id="modal-title"></p>
    <p id="modal-msg"></p>
    <input id="modal-input" type="text" style="display:none">
    <div id="modal-actions">
      <button id="modal-cancel" style="display:none">Annuler</button>
      <button id="modal-ok">OK</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2 id="statusText">Prêt à prendre ton service ?</h2>
    <div id="timer">00:00:00</div>
    
    <button class="primary" id="startBtn">Prise de service</button>

    <div id="recapForm">
      <h3 style="color:var(--primary)">Récapitulatif des interventions</h3>
      <div id="itemsList"><div class="muted">Aucune intervention pour le moment</div></div>
      
      <div style="margin:30px 0;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center">
        <select id="itemType">
          <option>Blessure légère</option>
          <option>Blessure moyenne</option>
          <option>Blessure grave</option>
          <option>IRM</option>
          <option>Radio</option>
          <option>Échographie</option>
          <option>Accessoire</option>
          <option>Chambre privée</option>
        </select>
        <input type="number" id="itemQty" value="1" min="1" style="width:80px;padding:10px">
        <button class="primary" style="padding:12px 20px;font-size:16px" onclick="addItem()">Ajouter</button>
      </div>

      <button class="primary" onclick="endShift()" style="background:#16a34a;margin-top:30px;padding:16px 40px;font-size:20px">
        Fin de service
      </button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient("https://sevrfgivcpefyykuffti.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNldnJmZ2l2Y3BlZnl5a3VmZnRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI5NDI1NTMsImV4cCI6MjA3ODUxODU1M30.YZnkSHsVWKQEhfU7xYfWyTFmtkM28Zuzdu7Y1sjBXQc")

if (!localStorage.getItem('sams_user')) window.location.href = 'login.html'
const user = JSON.parse(localStorage.getItem('sams_user'))

// --- MODAL SYSTEM ---
const overlay = document.getElementById('modal-overlay')
const modalTitle = document.getElementById('modal-title')
const modalMsg = document.getElementById('modal-msg')
const modalInput = document.getElementById('modal-input')
const modalOk = document.getElementById('modal-ok')
const modalCancel = document.getElementById('modal-cancel')

function openModal(type, title, msg) {
  return new Promise(resolve => {
    modalTitle.textContent = title
    modalMsg.textContent = msg
    overlay.style.display = 'flex'
    modalInput.style.display = type === 'prompt' ? 'block' : 'none'
    modalCancel.style.display = type !== 'alert' ? 'inline-block' : 'none'
    if (type === 'prompt') { modalInput.value = ''; setTimeout(() => modalInput.focus(), 50) }

    function clean() {
      overlay.style.display = 'none'
      modalOk.onclick = null
      modalCancel.onclick = null
    }
    modalOk.onclick = () => { clean(); resolve(type === 'prompt' ? modalInput.value : true) }
    modalCancel.onclick = () => { clean(); resolve(type === 'prompt' ? null : false) }
    if (type === 'prompt') {
      modalInput.onkeydown = e => { if (e.key === 'Enter') { clean(); resolve(modalInput.value) } }
    }
  })
}
const showAlert   = (msg, title='Information') => openModal('alert', title, msg)
const showConfirm = (msg, title='Confirmation') => openModal('confirm', title, msg)

// Variables persistantes
let items = JSON.parse(localStorage.getItem('current_shift_items') || '[]')
let startTime = localStorage.getItem('shift_start_time')
let timerInterval = null

function updateTimer() {
  if (!startTime) return
  const elapsed = Math.floor((Date.now() - new Date(startTime)) / 1000)
  const h = String(Math.floor(elapsed / 3600)).padStart(2, '0')
  const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0')
  const s = String(elapsed % 60).padStart(2, '0')
  document.getElementById('timer').textContent = `${h}:${m}:${s}`
}

function startTimer() {
  timerInterval = setInterval(updateTimer, 500)
  updateTimer()
}

if (startTime) {
  document.getElementById('statusText').innerHTML = `Service en cours depuis <strong>${new Date(startTime).toLocaleTimeString('fr-FR')}</strong>`
  document.getElementById('startBtn').style.display = 'none'
  document.getElementById('recapForm').style.display = 'block'
  renderItems()
  startTimer()
}

document.getElementById('startBtn').onclick = () => {
  startTime = new Date().toISOString()
  localStorage.setItem('shift_start_time', startTime)
  localStorage.setItem('current_shift_items', '[]')
  items = []
  location.reload()
}

window.addItem = () => {
  const type = document.getElementById('itemType').value
  const qty = parseInt(document.getElementById('itemQty').value) || 1
  items.push({ type, qty })
  localStorage.setItem('current_shift_items', JSON.stringify(items))
  renderItems()
  document.getElementById('itemQty').value = 1
}

function renderItems() {
  const list = document.getElementById('itemsList')
  if (items.length === 0) {
    list.innerHTML = '<div class="muted">Aucune intervention pour le moment</div>'
    return
  }
  list.innerHTML = items.map((it, i) => `
    <div class="item">
      <span>${it.qty}× ${it.type}</span>
      <button onclick="removeItem(${i})">✕</button>
    </div>
  `).join('')
}

window.removeItem = i => {
  items.splice(i, 1)
  localStorage.setItem('current_shift_items', JSON.stringify(items))
  renderItems()
}

window.endShift = async () => {
  if (!startTime) return
  const endTime = new Date()
  const duration = Math.floor((endTime - new Date(startTime)) / 60000)

  const recap = {}
  items.forEach(i => recap[i.type] = (recap[i.type] || 0) + i.qty)

  const interventionsSummary = items.length > 0
    ? items.map(i => `${i.qty}× ${i.type}`).join(', ')
    : 'Aucune'

  const ok = await showConfirm(
    `Durée : ${duration} minutes\nInterventions : ${interventionsSummary}`,
    "Terminer le service ?"
  )
  if (!ok) return

  try {
    await supabase.from('shifts').insert({
      user_id: user.id,
      username: user.user,
      start_time: startTime,
      end_time: endTime.toISOString(),
      duration_minutes: duration,
      recap
    })

    await supabase.rpc('increment_servicetime', { userid: user.id, minutes: duration })

    await supabase.from('logs').insert({
      user_id: user.id,
      username: user.user,
      action: 'clock_out',
      details: `Durée: ${duration} min | ${JSON.stringify(recap)}`
    })

    localStorage.removeItem('shift_start_time')
    localStorage.removeItem('current_shift_items')
    clearInterval(timerInterval)

    await showAlert(`${duration} minutes ont été ajoutées à ton temps total.`, "Service terminé !")
    location.reload()
  } catch (e) {
    await showAlert("Erreur : " + e.message, "Erreur")
  }
}

renderItems()
if (startTime) startTimer()
</script>
</body>
</html>
